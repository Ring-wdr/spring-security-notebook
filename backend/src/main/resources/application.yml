spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:${APP_DB_PORT:5432}/${APP_DB_NAME:security_notebook}
    username: ${APP_DB_USERNAME:security}
    password: ${APP_DB_PASSWORD:security}
  data:
    redis:
      host: localhost
      port: ${APP_VALKEY_PORT:6379}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent-output: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

app:
  docs:
    public-enabled: ${APP_DOCS_PUBLIC_ENABLED:true}
  bootstrap:
    demo-data-enabled: ${APP_BOOTSTRAP_DEMO_DATA_ENABLED:false}
  client:
    origin: ${APP_CLIENT_ORIGIN:http://localhost:3000}
  jwt:
    issuer: ${APP_JWT_ISSUER:spring-security-notebook}
    secret: ${APP_JWT_SECRET}
    access-token-minutes: 10
    refresh-token-minutes: 1440
  service-tokens:
    content:
      published: ${APP_CONTENT_PUBLISHED_SERVICE_TOKEN:}
      management: ${APP_CONTENT_MANAGEMENT_SERVICE_TOKEN:}
